<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resource Map</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      height: 100vh;
      font-family: sans-serif;
    }

    /* ── Left sidebar ── */
    #left-sidebar {
      width: 260px;
      background: #02274d;
      border-right: 1px solid #fff;
      flex-shrink: 0;
      padding: 20px;
      color: #aaa;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    #left-sidebar h2 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .text-umich-title {
      text-align: center;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    #extent-buttons {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #extent-buttons button {
      width: 100%;
      background: #fff;
      color: #3e4255;
      border: 1px solid #3e4255;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .15s;
    }

    #extent-buttons button:hover {
      background: #3e4255;
      color: #fff;
    }

    #extent-buttons button.active {
      background: #00274C;
      border-color: #FFCB05;
      color: #FFCB05;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      position: relative;
    }

    .leaflet-interactive:focus {
      outline: none;
    }

    /* ── Right sidebar ── */
    #right-sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: white;
      border-left: 1px solid #e0e0e0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.08);
    }

    #right-sidebar.open {
      transform: translateX(0);
    }

   .sidebar-header {
      padding: 6px 8px;
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .sidebar-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #aaa;
      line-height: 1;
      padding: 2px 4px;
    }

    .sidebar-close:hover {
      color: #333;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    .info-card-title {
      font-weight: 700;
      font-size: 15px;
      color: #00274C;
      margin-bottom: 8px;
    }

    /* ── Tooltip ── */
    .map-tooltip {
      background: #1a1d26;
      border: 1px solid #2e3140;
      color: #fff;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .3);
    }

    .map-tooltip::before {
      display: none;
    }

    .leaflet-interactive:focus {
      outline: none;
    }
  </style>
</head>

<body>

  <!-- Left sidebar -->
  <div id="left-sidebar">
    <h2 class="text-umich-title">University of Michigan AI Resource Map</h2>
    <!-- content goes here -->
    <div id="extent-buttons">
      <button class="active" onclick="goTo('central', this)">Ann Arbor — Central Campus</button>
      <button onclick="goTo('north', this)">Ann Arbor — North Campus</button>
      <button onclick="goTo('dearborn', this)">UM Dearborn</button>
      <button onclick="goTo('flint', this)">UM Flint</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map">

    <!-- Right sidebar (inside map so position:absolute works) -->
    <div id="right-sidebar">
      <div class="sidebar-header">
        <button class="sidebar-close" onclick="closeRightSidebar()">×</button>
      </div>
      <div class="sidebar-body" id="right-sidebar-body">
        <!-- content injected here -->
      </div>
    </div>

  </div>

  <script>
    const map = L.map('map').setView([42.278642, -83.736033], 16);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    fetch('map-data/um-building-footprint-edited.geojson')
      .then(res => res.json())
      .then(data => {
        L.geoJSON(data, {
          style: feature => ({
            color: '#00274C',
            weight: 1,
            fillColor: feature.properties.AI_resource ? '#FFCB05' : '#02274d',
            fillOpacity: feature.properties.AI_resource ? 0.9 : 0.4
          }),
          onEachFeature: (feature, layer) => {
            layer.bindTooltip(feature.properties.ObjectName || 'Unknown', {
              sticky: true,
              className: 'map-tooltip'
            });
            if (feature.properties.AI_resource) {
              layer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                layer.unbindTooltip();
                map.flyTo(e.latlng, 18, { duration: 1 });
                document.getElementById('right-sidebar-body').innerHTML = `
                  <div class="info-card-title">${feature.properties.org}</div>
                  <div>Address : ${feature.properties.address}</div>
                `;
                document.getElementById('right-sidebar').classList.add('open');
              });
            }
          }
        }).addTo(map);
      })
      .catch(err => console.error('Failed to load GeoJSON:', err));

    /* ── Close right sidebar ── */
    function closeRightSidebar() {
      document.getElementById('right-sidebar').classList.remove('open');
    }

    map.on('click', () => {
      closeRightSidebar();
    });

    /* ── Campus extents ── */
    const extents = {
      central: { center: [42.278642, -83.736033], zoom: 16 },
      north: { center: [42.295040, -83.709576], zoom: 16 },
      dearborn: { center: [42.319058, -83.231381], zoom: 16 },
      flint: { center: [43.019819, -83.689921], zoom: 16 }
    };

    function goTo(key, btn) {
      const e = extents[key];
      map.flyTo(e.center, e.zoom, { duration: 1.5 });
      document.querySelectorAll('#extent-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>

</html>
