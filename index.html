<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resource Map</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>

<body>

  <!-- Left sidebar -->
  <div id="left-sidebar">
    <h2 class="text-umich-title">University of Michigan AI Resource Map</h2>

    <div id="filter-section">
      <!-- Category filter -->
      <button class="filter-toggle" id="category-toggle" onclick="toggleFilter('category')">
        Filter by Category <span class="arrow">▼</span>
      </button>
      <div class="filter-list" id="category-list">
        <div class="filter-item" style="margin-bottom: 8px;">
          <input type="checkbox" id="cat-all" checked onchange="toggleAll('category', this)" />
          <label for="cat-all" style="font-weight:700; color:#00274C;">Select All</label>
        </div>
      </div>

      <!-- Audience filter -->
      <button class="filter-toggle" id="audience-toggle" onclick="toggleFilter('audience')" style="margin-top: 8px;">
        Filter by Audience <span class="arrow">▼</span>
      </button>
      <div class="filter-list" id="audience-list">
        <div class="filter-item" style="margin-bottom: 8px;">
          <input type="checkbox" id="aud-all" checked onchange="toggleAll('audience', this)" />
          <label for="aud-all" style="font-weight:700; color:#00274C;">Select All</label>
        </div>
      </div>
    </div>

    <div id="extent-buttons">
      <button class="active" onclick="goTo('central', this)">Ann Arbor — Central Campus</button>
      <button onclick="goTo('north', this)">Ann Arbor — North Campus</button>
      <button onclick="goTo('dearborn', this)">UM Dearborn</button>
      <button onclick="goTo('flint', this)">UM Flint</button>
    </div>

    <div style="background: #fff; margin: 10px -20px -20px -20px; padding: 12px 20px; text-align: center;">
      <img src="assets/AIIM_logo.png" style="width: 100%; max-width: 200px;" />
    </div>
  </div> <!-- ← closes #left-sidebar -->

  <!-- Map -->
  <div id="map">
    <div id="right-sidebar">
      <div class="right-sidebar-header">
        <button class="right-sidebar-close" onclick="closeRightSidebar()">×</button>
      </div>
      <div class="right-sidebar-body" id="right-sidebar-body">
        <!-- content injected here -->
      </div>
    </div>
  </div>

  <script>
    const map = L.map('map').setView([42.278642, -83.736033], 16);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    let geojsonLayer = null;

    const categories = [
      'AI Development',
      'AI Research',
      'Applied & Domain Focused Research',
      'Arts, Humanities & Creative Practice',
      'Computing & Technical Resources',
      'Computing and Technical Resource',
      'Consulting & Support',
      'Development & Methods',
      'Ethics, Society & Policy',
      'Funding & Project Development',
      'Research & Methods'
    ];

    const audiences = [
      /* add your audience options here */
    ];

    /* Build checkboxes */
    function buildCheckboxes(list, containerId, prefix) {
      const container = document.getElementById(containerId);
      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'filter-item';
        div.innerHTML = `
      <input type="checkbox" id="${prefix}-${item}" value="${item}" checked onchange="applyFilter()"/>
      <label for="${prefix}-${item}">${item}</label>
    `;
        container.appendChild(div);
      });
    }

    buildCheckboxes(categories, 'category-list', 'cat');
    buildCheckboxes(audiences, 'audience-list', 'aud');

    function toggleFilter(type) {
      document.getElementById(`${type}-toggle`).classList.toggle('open');
      document.getElementById(`${type}-list`).classList.toggle('open');
    }

    function toggleAll(type, el) {
      const list = type === 'category' ? categories : audiences;
      const prefix = type === 'category' ? 'cat' : 'aud';
      list.forEach(item => {
        document.getElementById(`${prefix}-${item}`).checked = el.checked;
      });
      applyFilter();
    }

    function applyFilter() {
      const selectedCats = categories.filter(c => document.getElementById(`cat-${c}`).checked);
      const selectedAuds = audiences.filter(a => document.getElementById(`aud-${a}`).checked);

      document.getElementById('cat-all').checked = selectedCats.length === categories.length;
      document.getElementById('aud-all').checked = selectedAuds.length === audiences.length;

      if (!geojsonLayer) return;

      geojsonLayer.eachLayer(layer => {
        const props = layer.feature.properties;
        if (!props.is_resource) return;

        const buildingCats = Array.isArray(props.category)
          ? props.category
          : (props.category || '').split(';').map(s => s.trim()).filter(s => s);

        const buildingAuds = Array.isArray(props.audience)
          ? props.audience
          : (props.audience || '').split(';').map(s => s.trim()).filter(s => s);

        const allCatsSelected = selectedCats.length === categories.length;
        const allAudsSelected = selectedAuds.length === audiences.length;

        const catMatch = allCatsSelected || (selectedCats.length > 0 && buildingCats.some(s => selectedCats.includes(s)));
        const audMatch = allAudsSelected || (selectedAuds.length > 0 && buildingAuds.some(s => selectedAuds.includes(s)));

        const match = catMatch && audMatch;

        layer.setStyle({
          fillColor: match ? '#FFCB05' : '#02274d',
          fillOpacity: match ? 0.9 : 0.1
        });
      });
    }


    fetch('map-data/um-building-footprint-edited.geojson')
      .then(res => res.json())
      .then(data => {
        geojsonLayer = L.geoJSON(data, {
          style: feature => ({
            color: '#02274d',
            weight: 0.75,
            fillColor: feature.properties.is_resource ? '#FFCB05' : '#02274d',
            fillOpacity: feature.properties.is_resource ? 0.9 : 0.1
          }),
          onEachFeature: (feature, layer) => {
            layer.bindTooltip(feature.properties.building_name || 'Unknown', {
              sticky: true,
              className: 'map-tooltip'
            });
            if (feature.properties.is_resource) {
              layer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                layer.closeTooltip();
                map.flyTo(e.latlng, 18, { duration: 1 });

                const p = feature.properties;                                           // ← define p
                const categories = Array.isArray(p.category)
                  ? p.category
                  : (p.category || '').split(';').map(s => s.trim()).filter(s => s);

                document.getElementById('right-sidebar-body').innerHTML = `
    <div class="info-card-title">${p.org || ''}</div>
    <div class="info-desc">${p.description || ''}
      <a href="${p.url}" target="_blank" class="learn-more">Learn More</a>
    </div>
    <div class="info-row"><span class="info-label">Address</span>${p.address || ''}</div>
    <div class="info-row"><span class="info-label">Email</span><a href="mailto:${p.email}">${p.email || ''}</a></div>
    <div class="info-row"><span class="info-label">Website</span><a href="${p.url}" target="_blank">${p.url || ''}</a></div>
       <div class="info-row">
  <span class="info-label">Categories</span>
  <div class="filter-tags">
    ${categories.map(s => `<span class="filter-tag">${s}</span>`).join('')}
  </div>
</div>

    
  `;
                document.getElementById('right-sidebar').classList.add('open');
              });
            }
          }
        }).addTo(map);
      })
      .catch(err => console.error('Failed to load GeoJSON:', err));


    /* ── Close right sidebar ── */
    function closeRightSidebar() {
      document.getElementById('right-sidebar').classList.remove('open');
    }

    map.on('click', () => {
      closeRightSidebar();
    });

    /* ── Campus extents ── */
    const extents = {
      central: { center: [42.278642, -83.736033], zoom: 16 },
      north: { center: [42.295040, -83.709576], zoom: 16 },
      dearborn: { center: [42.319058, -83.231381], zoom: 16 },
      flint: { center: [43.019819, -83.689921], zoom: 16 }
    };

    function goTo(key, btn) {
      const e = extents[key];
      map.flyTo(e.center, e.zoom, { duration: 1.5 });
      document.querySelectorAll('#extent-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }



  </script>

</body>

</html>
