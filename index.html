<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resource Map</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>

<body>

  <!-- Left sidebar -->
  <div id="left-sidebar">
    <h2 class="text-umich-title">University of Michigan AI Resource Map</h2>
    <p class="info-desc" style="color: #fff">Map shows AI resources across the three campuses of the University of Michigan. Hover over any building to see its name. Click a highlighted building to view organization details. Use the filter on the left to highlight buiding by service category.</p>
    

    <div id="filter-section">
      <button id="filter-toggle" onclick="toggleFilter()">
        Filter by Service <span class="arrow">▼</span>
      </button>
      <div id="filter-list">
        <div class="filter-item" style="margin-bottom: 8px;">
          <input type="checkbox" id="cat-all" checked onchange="toggleAll(this)" />
          <label for="cat-all" style="font-weight:700; color:#00274C;">Select All</label>
        </div>
        <!-- categories injected here -->
      </div>
    </div>


    <div id="extent-buttons">
      <button class="active" onclick="goTo('central', this)">Ann Arbor — Central Campus</button>
      <button onclick="goTo('north', this)">Ann Arbor — North Campus</button>
      <button onclick="goTo('dearborn', this)">UM Dearborn</button>
      <button onclick="goTo('flint', this)">UM Flint</button>
    </div>

    <div style="background: #fff; margin: 10px -20px -20px -20px; padding: 12px 20px; text-align: center;">
  <img src="assets/AIIM_logo.png" style="width: 100%; max-width: 200px;"/>
</div>
  </div>

  <!-- Map -->
  <div id="map">

    <!-- Right sidebar (inside map so position:absolute works) -->
    <div id="right-sidebar">
      <div class="right-sidebar-header">
        <button class="right-sidebar-close" onclick="closeRightSidebar()">×</button>
      </div>
      <div class="right-sidebar-body" id="right-sidebar-body">
        <!-- content injected here -->
      </div>
    </div>

  </div>

  <script>
    const map = L.map('map').setView([42.278642, -83.736033], 16);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    let geojsonLayer = null;

    const categories = [
      'AI Development',
      'AI Research',
      'Applied & Domain Focused Research',
      'Arts, Humanities & Creative Practice',
      'Computing & Technical Resources',
      'Computing and Technical Resource',
      'Consulting & Support',
      'Development & Methods',
      'Ethics, Society & Policy',
      'Funding & Project Development',
      'Research & Methods'
    ];

    /* Build checkboxes */
    const filterList = document.getElementById('filter-list');
    categories.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'filter-item';
      item.innerHTML = `
        <input type="checkbox" id="cat-${cat}" value="${cat}" checked onchange="applyFilter()"/>
        <label for="cat-${cat}">${cat}</label>
      `;
      filterList.appendChild(item);
    });

    function toggleFilter() {
      document.getElementById('filter-toggle').classList.toggle('open');
      document.getElementById('filter-list').classList.toggle('open');
    }
    function toggleAll(el) {
      categories.forEach(cat => {
        document.getElementById(`cat-${cat}`).checked = el.checked;
      });
      applyFilter();
    }

    function applyFilter() {
      const selected = categories.filter(cat =>
        document.getElementById(`cat-${cat}`).checked
      );

      // sync select-all checkbox
      document.getElementById('cat-all').checked = selected.length === categories.length;

      if (!geojsonLayer) return;
      geojsonLayer.eachLayer(layer => {
        console.log(typeof layer.feature.properties.service);
        const props = layer.feature.properties;

        if (!props.is_resource) return;

        const services = Array.isArray(props.service) ? props.service : JSON.parse((props.service || '[]').replace(/'/g, '"'));
        const allSelected = selected.length === categories.length;           // ← all checked
        const match = allSelected || (selected.length > 0 && services.some(s => selected.includes(s)));

        // matched AI buildings → yellow, unmatched → dim blue like normal buildings
        layer.setStyle({
          fillColor: match ? '#FFCB05' : '#02274d',
          fillOpacity: match ? 0.9 : 0.4
        });
      });
    }


    fetch('map-data/um-building-footprint-edited.geojson')
      .then(res => res.json())
      .then(data => {
        geojsonLayer = L.geoJSON(data, {
          style: feature => ({
            color: '#02274d',
            weight: 0.75,
            fillColor: feature.properties.is_resource ? '#FFCB05' : '#02274d',
            fillOpacity: feature.properties.is_resource ? 0.9 : 0.1
          }),
          onEachFeature: (feature, layer) => {
            layer.bindTooltip(feature.properties.building_name || 'Unknown', {
              sticky: true,
              className: 'map-tooltip'
            });
            if (feature.properties.is_resource && feature.properties.org) {
              layer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                layer.closeTooltip();
                map.flyTo(e.latlng, 18, { duration: 1 });

                const p = feature.properties;                                           // ← define p
                const services = Array.isArray(p.service) ? p.service : JSON.parse((p.service || '[]').replace(/'/g, '"'));

                document.getElementById('right-sidebar-body').innerHTML = `
    <div class="info-card-title">${p.org || ''}</div>
    <div class="info-desc">${p.description || ''}
      <a href="${p.url}" target="_blank" class="learn-more">Learn More</a>
    </div>
    <div class="info-row"><span class="info-label">Address</span>${p.address || ''}</div>
    <div class="info-row"><span class="info-label">Email</span><a href="mailto:${p.email}">${p.email || ''}</a></div>
    <div class="info-row"><span class="info-label">Website</span><a href="${p.url}" target="_blank">${p.url || ''}</a></div>
       <div class="info-row">
  <span class="info-label">Services</span>
  <div class="service-tags">
    ${services.map(s => `<span class="service-tag">${s}</span>`).join('')}
  </div>
</div>

    
  `;
                document.getElementById('right-sidebar').classList.add('open');
              });
            }
          }
        }).addTo(map);
      })
      .catch(err => console.error('Failed to load GeoJSON:', err));


    /* ── Close right sidebar ── */
    function closeRightSidebar() {
      document.getElementById('right-sidebar').classList.remove('open');
    }

    map.on('click', () => {
      closeRightSidebar();
    });

    /* ── Campus extents ── */
    const extents = {
      central: { center: [42.278642, -83.736033], zoom: 16 },
      north: { center: [42.295040, -83.709576], zoom: 16 },
      dearborn: { center: [42.319058, -83.231381], zoom: 16 },
      flint: { center: [43.019819, -83.689921], zoom: 16 }
    };

    function goTo(key, btn) {
      const e = extents[key];
      map.flyTo(e.center, e.zoom, { duration: 1.5 });
      document.querySelectorAll('#extent-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }



  </script>

</body>

</html>
