<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resource Map</title>
  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; font-family: sans-serif; }

    #sidebar {
      width: 260px;
      background: #02274d;
      border-right: 1px solid #ffff;
      flex-shrink: 0;
      padding: 20px;
      color: #aaa;
      font-size: 13px;
    }

    #sidebar h2 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #map { flex: 1; }

    .text-align-center {
     text-align: center;
    }
    .text-umich-title {
      text-align: center;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    #extent-buttons {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #extent-buttons button {
      width: 100%;
      background: #fff;
      color:#3e4255 ;
      border: 1px solid #3e4255;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .15s;
    }

    #extent-buttons button:hover { background: #3e4255; color: #fff; }
    #extent-buttons button.active { background: #00274C; border-color: #FFCB05; color: #FFCB05; }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2 class="text-umich-title">University of Michigan AI Resource Map</h2>
    <!-- content goes here -->
     <div id="extent-buttons">
      <button class="active" onclick="goTo('central', this)">Ann Arbor — Central Campus</button>
      <button onclick="goTo('north', this)">Ann Arbor — North Campus</button>
      <button onclick="goTo('dearborn', this)">UM Dearborn</button>
      <button onclick="goTo('flint', this)">UM Flint</button>
    </div>
  </div>

  <div id="map"></div>

<script>
const map = L.map('map').setView([42.2808, -83.7430], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    fetch('map-data/um-building-footprint.geojson')
      .then(res => res.json())
      .then(data => {
        const layer = L.geoJSON(data).addTo(map);
        const bounds = layer.getBounds();
        /* lock min zoom to the full geojson extent */
        map.setMinZoom(map.getBoundsZoom(bounds));
        map.fitBounds(bounds);
      })
      .catch(err => console.error('Failed to load GeoJSON:', err));

    const extents = {
      central:  { center: [42.2808, -83.7430], zoom: 15 },
      north:    { center: [42.2931, -83.7157], zoom: 15 },
      dearborn: { center: [42.3223, -83.1763], zoom: 15 },
      flint:    { center: [43.0125, -83.7127], zoom: 15 }
    };

    function goTo(key, btn) {
      const e = extents[key];
      map.flyTo(e.center, e.zoom, { duration: 1.5 });
      document.querySelectorAll('#extent-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
